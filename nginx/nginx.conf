user  nginx;
worker_processes  1;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;


events {
    worker_connections  8192;
}


http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    tcp_nopush     on;

    keepalive_timeout  65;

    server_tokens off;
    gzip  on;

    server {
        listen 8081 ;

        location / {
            root /elastdocker/package;
            autoindex on;
        }

    }

    server {
        listen 5678 ssl;
        server_name n8n.drs;

        ssl_certificate     /etc/ssl/certs/server.crt;
        ssl_certificate_key /etc/ssl/certs/server.key;

        location / {
            proxy_pass http://n8n:5678;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }


}


stream {

    server {
        resolver 127.0.0.11 valid=10s;
        listen 1514;
        set $wazuhcluster wazuhcluster:1514;
        proxy_pass $wazuhcluster;
    }

     server {
        resolver 127.0.0.11 valid=10s;
        listen 1515;
        set $wazuhcluster_auth wazuhcluster:1515;
        proxy_pass $wazuhcluster_auth;
    }   


    server {
        resolver 127.0.0.11 valid=10s;
        listen 3000;
        set $grafana dsig-grafana:3000;
        proxy_pass $grafana;
    }


    server {
        resolver 127.0.0.11 valid=10s;
        listen 9200;
        set $eshot elasticsearch-hot:9200;
        proxy_pass $eshot;
    }    

    server {
        resolver 127.0.0.11 valid=10s;
        listen 9300;
        set $escold elasticsearch-cold:9300;
        proxy_pass $escold;
    }    

    server {
        resolver 127.0.0.11 valid=10s;
        listen 443;
        set $kibana kibana:5601;
        proxy_pass $kibana;
    }    

    server {
        resolver 127.0.0.11 valid=10s;
        listen 8443;
        set $wazuhkibana wazuh.dashboard:5601;
        proxy_pass $wazuhkibana;
    }  

    server {
        resolver 127.0.0.11 valid=10s;
        listen 19200;
        set $wazuhindexer1 wazuh1-indexer:9200;
        proxy_pass $wazuhindexer1;
    } 

    server {
        resolver 127.0.0.11 valid=10s;
        listen 9443;
        set $portainerconsole portainer-console:9443;
        proxy_pass $portainerconsole;
    } 

    server {
        resolver 127.0.0.11 valid=10s;
        listen 8220;
        set $fleetserver fleetserver:8220;
        proxy_pass $fleetserver;
    }

    server {
        resolver 127.0.0.11 valid=10s;
        listen 8089;
        set $fleetserver fleetserver:8220;
        proxy_pass $fleetserver;
    }      

     server {
        resolver 127.0.0.11 valid=10s;
        listen 5044;
        set $logstash_5044 logstash:5044;
        proxy_pass $logstash_5044;
    }   

     server {
        resolver 127.0.0.11 valid=10s;
        listen 5514 udp;
        set $logstash_5514 logstash:5514;
        proxy_pass $logstash_5514;
    }   
    server {
        resolver 127.0.0.11 valid=10s;
        listen 8086;
        set $influx_8086 dsig-influx:8086;
        proxy_pass $influx_8086;
    }  

    server {
        resolver 127.0.0.11 valid=10s;
        listen 55000;
        set $wazuh_55000 wazuhcluster:55000;
        proxy_pass $wazuh_55000;
    }  
 

    server {
        resolver 127.0.0.11 valid=10s;
        listen 9092;
        set $kafka1 kafka1:9092;
        proxy_pass $kafka1;
    } 

    server {
        resolver 127.0.0.11 valid=10s;
        listen 9093;
        set $kafka2 kafka2:9093;
        proxy_pass $kafka2;
    } 

    server {
        resolver 127.0.0.11 valid=10s;
        listen 9094;
        set $kafka3 kafka3:9094;
        proxy_pass $kafka3;
    }


    server {
        resolver 127.0.0.11 valid=10s;
        listen 81;
        set $httpserver nginx:8081;
        proxy_pass $httpserver;
    } 
    
}
